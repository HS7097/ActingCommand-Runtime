name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        id: toolchain
      - name: Rust cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-trybuild-clean-v1-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-trybuild-clean-v1-${{ steps.toolchain.outputs.cachekey }}-
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        env:
          TEMP: ${{ runner.temp }}
          TMP: ${{ runner.temp }}
        run: cargo test --workspace
      - name: Remove trybuild cache artifacts
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath target/tests) {
            Remove-Item -LiteralPath target/tests -Recurse -Force -ErrorAction Stop
          }
